    .common:nth-child(even){
        border-radius: 50%;
    }

    .common:nth-child(odd){
        border: 10px solid beige;
    }

    .hero-blob{
        position: relative;
        left: 50px;
        width: 280px;
        height: 280px;

        /* linear-gradient(direction,color1,color2,.......) */
        background: linear-gradient(135deg,orange,indigo);
        filter: blur(10px);
        border-radius: 41% 58% 68% 37%;

        animation: float 4s ease-in-out infinite;
    }

    .floating-card{
        padding: 10px 20px;
        position:absolute;
        background-color: black;
        color: white;
        border-radius: 16px;

        z-index: 2;
        animation: float 4s ease-in-out infinite;
    }

    .card-1{top: 10px; left: 20px; animation-delay: 0s;}
    .card-2{top: 130px; left: 280px; animation-delay:1.2s ;}
    .card-3{top: 200px; left: 20px; animation-delay: 2.4s;}

    @keyframes float{
        0% , 100% {
            transform: translateY(0);
        }

        50%{
            transform: translateY(-16px);
        }
    }

</style>
